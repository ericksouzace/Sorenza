name: Build Sorenza for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        run: |
          $env:NPM_CONFIG_CACHE = Join-Path $env:RUNNER_TEMP "sorenza-npm-cache"
          npm cache verify
          npm ci --prefer-online --fetch-retries=3 --fetch-retry-mintimeout=1000 --fetch-retry-maxtimeout=30000

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Sorenza Windows app
        uses: tauri-apps/tauri-action@v0

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Sorenza-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
